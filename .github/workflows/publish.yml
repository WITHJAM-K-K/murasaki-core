name: Publish WASM to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="murasaki-wasm") | .version')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Cargo version: $CARGO_VERSION"
          echo "Tag version:   $TAG_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml has $CARGO_VERSION but tag is $TAG_VERSION"
            exit 1
          fi

      - uses: jetli/wasm-pack-action@v0.4.0

      - name: Build with wasm-pack
        working-directory: crates/murasaki-wasm
        run: wasm-pack build --target bundler --release --scope withjam-k-k

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: crates/murasaki-wasm
        run: npm publish ./pkg --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
