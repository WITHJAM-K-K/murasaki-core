name: Security Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
